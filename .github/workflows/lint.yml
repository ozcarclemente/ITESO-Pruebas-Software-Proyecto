name: Lint

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    run-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint
