services:
  postgres:
    image: postgres:15
    container_name: proyecto_prueba_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # POSTGRES_DB: database_development
    ports:
      - "5432:5432"
